# Cloudflare Worker for nebelhaus.com. One Worker serves three things:
#   /init.sh         the install one-liner  (curl -fsSL https://nebelhaus.com/init.sh | bash)
#   /                the landing page       (Astro)
#   /docs, /guides…  the docs               (Starlight)
#
# The site is a static Astro build in ./dist, served by the [assets] binding.
# worker.js only handles /init.sh; the [assets] binding serves everything else.
#
# Build then deploy (the nebelhaus.com zone must be on the logged-in CF account):
#   cd web && npm ci && npm run build
#   npx wrangler deploy        # (nixpkgs' wrangler fails to build — use npx)
name = "nebelhaus"
main = "worker.js"
compatibility_date = "2024-11-06"

# The whole apex zone routes through this Worker. Static assets short-circuit
# first; only /init.sh (and any non-asset path) reaches worker.js.
routes = [
  { pattern = "nebelhaus.com/*", zone_name = "nebelhaus.com" },
]

# The static Astro/Starlight build. `binding = "ASSETS"` also lets worker.js
# fall back to env.ASSETS.fetch(). 404s render Starlight's own 404 page.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"

# Optional hard pin: uncomment and set REF to a tag to force /init.sh at that
# ref for everyone, regardless of the latest release. Left unset, the Worker
# auto-resolves the latest GitHub release tag (cached ~1h), falling back to
# `main` before the first release exists.
# [vars]
# REF = "v2026.07.18"
