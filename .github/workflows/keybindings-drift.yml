# Keybinding drift tripwire — fails when the rice's bindings move past what the
# docs were last checked against. The rice generates its in-app cheatsheet from
# modules/prowl/wm-bindings.nix, so it can't drift internally; this site's
# keybinding pages are prose, and prose drifts (⌥1–4 outlived its binding here
# by weeks). web/scripts/check-rice-bindings.mjs re-derives a snapshot of the
# rice's binding surface and diffs it against the committed copy; red means "a
# human updates the docs, then refreshes the snapshot with --update".
#
# Runs weekly (drift comes from RICE pushes, which can't trigger this repo's
# CI), on demand, and whenever the checker/snapshot themselves change.
name: keybindings drift

on:
  schedule:
    - cron: '0 9 * * 1' # Monday morning
  workflow_dispatch: {}
  push:
    paths:
      - 'web/scripts/check-rice-bindings.mjs'
      - 'web/src/data/rice-bindings.json'
      - '.github/workflows/keybindings-drift.yml'
  pull_request:
    paths:
      - 'web/scripts/check-rice-bindings.mjs'
      - 'web/src/data/rice-bindings.json'
      - '.github/workflows/keybindings-drift.yml'

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nebelhaus/nebelhaus
          path: .rice
      # nix eval of a plain .nix file — no flakes, no fetches, no builds.
      - uses: DeterminateSystems/nix-installer-action@main
      - run: node web/scripts/check-rice-bindings.mjs --rice .rice
