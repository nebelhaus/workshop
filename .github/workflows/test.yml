# Verify the workshop's two code artifacts on every push and PR:
#   • web/worker.js  — the /init.sh Worker (Vitest unit suite)
#   • bench          — the family CLI (bats unit suite + shellcheck)
#
# This is the gate the repo was missing: deploy-web.yml only builds + deploys,
# so nothing checked behavior before. Kept separate from deploy so a red test
# blocks a merge without touching the deploy path.
name: Tests

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  web:
    name: web/worker.js (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test

  bench:
    name: bench (bats + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + shellcheck
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck
      - name: shellcheck bench
        run: shellcheck bench
      - name: bats
        run: bats test/bench.bats
